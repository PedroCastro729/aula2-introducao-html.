<!DOCTYPE html>
<html>

  <head>
	<script>
	 window.onload = () => {
	  const item = document.querySelector('h1');

	  item.addEventListener('mouseover', () => {
	   item.style.color = 'red';
	  });
	}
	</script>
	<style>
		h1 { color: blue; background-color: green;}
	</style>
  </head>
  <body>
	<h1>Wikipedia</h1>
  </body>
</html>
